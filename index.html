<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Clicker: God Mode</title>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Verdana', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        #game-container { display: flex; gap: 20px; padding: 20px; width: 95vw; max-width: 1500px; }
        .panel { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.8); flex: 1; min-height: 600px; transition: 0.3s; }
        .panel:hover { border-color: #444; }
        
        /* Заголовки */
        h3 { color: #888; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
        
        /* Клик-зона */
        #main-btn { width: 220px; height: 220px; border-radius: 50%; border: 8px solid #1a1a1a; background: radial-gradient(circle, #333 0%, #000 100%); color: white; font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.1s; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #main-btn:active { transform: scale(0.9); box-shadow: 0 0 50px #444; }
        
        /* Ресурсы */
        .stat-box { margin-bottom: 20px; }
        .val { font-size: 24px; font-weight: bold; display: block; }
        .gold { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .crys { color: #00f2ff; text-shadow: 0 0 10px rgba(0,242,255,0.3); }
        .rp { color: #ff4d4d; }
        .dm { color: #bc13fe; }

        /* Прогресс-бары */
        .bar { background: #1a1a1a; height: 10px; border-radius: 5px; margin-top: 5px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { background: linear-gradient(90deg, #00ff00, #55ff55); width: 0%; height: 100%; transition: 0.2s; }

        /* Кнопки */
        .btn { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s; text-align: left; }
        .btn:hover:not(:disabled) { background: #252525; border-color: #555; color: #fff; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .rebirth-btn { border-color: #ff4d4d; color: #ff4d4d; font-weight: bold; text-align: center; font-size: 16px; }

        /* Сетка древа */
        .tree-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .node { padding: 10px; font-size: 11px; border: 2px solid #222; border-radius: 8px; background: #0a0a0a; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .node.available { opacity: 1; border-color: #444; }
        .node.bought { border-color: #ff4d4d; background: #200; opacity: 1; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .node.dm-bought { border-color: #bc13fe; background: #1a0525; opacity: 1; }

        /* Анимация клика */
        .pop { position: absolute; pointer-events: none; animation: popUp 0.6s ease-out forwards; font-weight: bold; font-size: 20px; z-index: 100; }
        @keyframes popUp { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -100px); opacity: 0; } }
    </style>
</head>
<body>

<h1 style="margin: 20px 0;">ULTIMATE CLICKER <span style="color: #ff4d4d;">X</span></h1>

<div id="game-container">
    <div class="panel">
        <h3>Прогресс Героя</h3>
        <div class="stat-box">
            <span>Уровень: <b id="lvl">1</b></span>
            <div class="bar"><div id="exp-fill"></div></div>
            <small style="color: #666">Бонус клика: <span id="lvl-bonus">0</span>%</small>
        </div>
        
        <div class="stat-box">
            <button class="btn rebirth-btn" id="reb-btn">
                РЕБИРТ<br>
                <small>Цена: <span id="reb-cost">1000</span> Золота</small>
            </button>
            <p>Всего ребиртов: <b id="reb-cnt">0</b></p>
            <p>Очки (RP): <b class="rp" id="rp-cnt">0</b></p>
        </div>

        <hr style="border: 0; border-top: 1px solid #222;">
        <h3>Автоматизация</h3>
        <div id="auto-stats" style="font-size: 12px; color: #888;">
            Доход в сек: <span id="income">0</span> з/с
        </div>
    </div>

    <div class="panel" style="text-align: center; flex: 1.5; background: #000;">
        <div class="stat-box">
            <span class="val gold" id="gold-val">0</span>
            <small>ЗОЛОТО</small>
        </div>
        <div class="stat-box">
            <span class="val crys" id="crys-val">0</span>
            <small>СИНИЕ КРИСТАЛЛЫ</small>
        </div>

        <div style="margin: 40px 0; position: relative;" id="click-zone">
            <button id="main-btn">КЛИК</button>
        </div>

        <div id="dm-panel" style="display: none; border: 1px solid #bc13fe; padding: 10px; border-radius: 10px;">
            <span class="val dm" id="dm-val">0</span>
            <small>ЧЕРНАЯ МАТЕРИЯ</small>
        </div>
    </div>

    <div class="panel">
        <h3>Улучшения Клика</h3>
        <button class="btn" onclick="buyUp('cp')">Сила Клика (Lvl <span id="l-cp">0</span>)<br>Цена: <span id="c-cp">10</span></button>
        <button class="btn" onclick="buyUp('ec')">Шанс Кристалла (Lvl <span id="l-ec">0</span>)<br>Цена: <span id="c-ec">50</span></button>
        <button class="btn" onclick="buyUp('crit')">Крит. Урон (x2) (Lvl <span id="l-crit">0</span>)<br>Цена: <span id="c-crit">500</span></button>

        <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
        <h3>Древо Ребирта (RP)</h3>
        <div class="tree-grid" id="rp-tree"></div>

        <div id="dm-tree-box" style="display: none;">
            <hr style="border: 0; border-top: 1px solid #bc13fe; margin: 20px 0;">
            <h3 class="dm">Древо Материи (DM)</h3>
            <div class="tree-grid" id="dm-tree"></div>
        </div>
    </div>
</div>

<script>
    let s = {
        g: 0, c: 0, dm: 0,
        lvl: 1, exp: 0, expN: 100,
        rb: 0, rp: 0, rbC: 1000,
        up: { cp: 0, ec: 0, crit: 0 },
        nodes: []
    };

    const RP_DATA = {
        'a1': { n: "Дроны", d: "10 з/с", c: 1, r: 1 },
        'e1': { n: "Обучение", d: "Exp x2", c: 3, r: 2 },
        'c1': { n: "Магнит", d: "Кристаллы x3", c: 8, r: 3 },
        'g1': { n: "Золотая жила", d: "Клик x5", c: 15, r: 5 },
        'dark': { n: "ТЬМА", d: "Открыть DM", c: 30, r: 8 }
    };

    const DM_DATA = {
        'dm1': { n: "Бог Клика", d: "Клик x100", c: 10 },
        'dm2': { n: "Бесконечность", d: "Авто x50", c: 25 },
        'dm3': { n: "Вне Времени", d: "Lvl не сброс.", c: 100 }
    };

    const mainBtn = document.getElementById('main-btn');
    
    mainBtn.onclick = (e) => {
        // Логика силы
        let p = (1 + s.up.cp * 2) * (1 + s.lvl * 0.05) * (1 + s.rb);
        if(s.nodes.includes('g1')) p *= 5;
        if(s.nodes.includes('dm1')) p *= 100;

        // Крит
        let isCrit = Math.random() < (s.up.crit * 0.05);
        if(isCrit) p *= 2;

        s.g += p;

        // Кристаллы
        let eChance = 0.05 + (s.up.ec * 0.01);
        let gotC = Math.random() < eChance;
        let cVal = 0;
        if(gotC) {
            cVal = Math.floor(p * 0.2);
            if(s.nodes.includes('c1')) cVal *= 3;
            s.c += cVal;
        }

        // Материя
        let gotDM = false;
        if(s.nodes.includes('dark') && Math.random() < 0.01) {
            s.dm++;
            gotDM = true;
        }

        // Опыт
        let ex = 10;
        if(s.nodes.includes('e1')) ex *= 2;
        s.exp += ex;
        if(s.exp >= s.expN) { s.lvl++; s.exp = 0; s.expN *= 1.3; }

        showPop(e.clientX, e.clientY, p, cVal, isCrit, gotDM);
        update();
    };

    function buyUp(id) {
        let costs = { cp: 10 * 1.5**s.up.cp, ec: 50 * 1.8**s.up.ec, crit: 500 * 2.2**s.up.crit };
        if(s.g >= costs[id]) {
            s.g -= costs[id];
            s.up[id]++;
            update();
        }
    }

    document.getElementById('reb-btn').onclick = () => {
        if(s.g >= s.rbC) {
            s.rb++;
            s.rp += s.rb * 3;
            s.g = 0; s.c = 0;
            s.up = { cp: 0, ec: 0, crit: 0 };
            if(!s.nodes.includes('dm3')) { s.lvl = 1; s.exp = 0; s.expN = 100; }
            s.rbC *= 15;
            update();
            renderTrees();
        }
    };

    function update() {
        document.getElementById('gold-val').innerText = Math.floor(s.g).toLocaleString();
        document.getElementById('crys-val').innerText = Math.floor(s.c).toLocaleString();
        document.getElementById('dm-val').innerText = s.dm;
        document.getElementById('lvl').innerText = s.lvl;
        document.getElementById('lvl-bonus').innerText = Math.floor(s.lvl * 5);
        document.getElementById('exp-fill').style.width = (s.exp/s.expN*100) + "%";
        document.getElementById('reb-cnt').innerText = s.rb;
        document.getElementById('rp-cnt').innerText = s.rp;
        document.getElementById('reb-cost').innerText = Math.floor(s.rbC).toLocaleString();
        
        document.getElementById('l-cp').innerText = s.up.cp;
        document.getElementById('c-cp').innerText = Math.floor(10 * 1.5**s.up.cp).toLocaleString();
        document.getElementById('l-ec').innerText = s.up.ec;
        document.getElementById('c-ec').innerText = Math.floor(50 * 1.8**s.up.ec).toLocaleString();
        document.getElementById('l-crit').innerText = s.up.crit;
        document.getElementById('c-crit').innerText = Math.floor(500 * 2.2**s.up.crit).toLocaleString();

        document.getElementById('reb-btn').disabled = s.g < s.rbC;

        if(s.nodes.includes('dark')) {
            document.getElementById('dm-panel').style.display = 'block';
            document.getElementById('dm-tree-box').style.display = 'block';
        }

        let inc = 0;
        if(s.nodes.includes('a1')) inc = 10 * (s.nodes.includes('dm2') ? 50 : 1);
        document.getElementById('income').innerText = inc;
    }

    function renderTrees() {
        const rt = document.getElementById('rp-tree');
        rt.innerHTML = '';
        for(let id in RP_DATA) {
            let n = RP_DATA[id];
            let d = document.createElement('div');
            let isAvail = s.rp >= n.c && s.rb >= n.r && !s.nodes.includes(id);
            d.className = `node ${s.nodes.includes(id) ? 'bought' : (isAvail ? 'available' : '')}`;
            d.innerHTML = `<b>${n.n}</b><br>${n.d}<br>${n.c} RP`;
            d.onclick = () => { if(isAvail) { s.rp -= n.c; s.nodes.push(id); renderTrees(); update(); } };
            rt.appendChild(d);
        }

        const dt = document.getElementById('dm-tree');
        dt.innerHTML = '';
        for(let id in DM_DATA) {
            let n = DM_DATA[id];
            let d = document.createElement('div');
            let isAvail = s.dm >= n.c && !s.nodes.includes(id);
            d.className = `node ${s.nodes.includes(id) ? 'dm-bought' : (isAvail ? 'available' : '')}`;
            d.innerHTML = `<b>${n.n}</b><br>${n.d}<br>${n.c} DM`;
            d.onclick = () => { if(isAvail) { s.dm -= n.c; s.nodes.push(id); renderTrees(); update(); } };
            dt.appendChild(d);
        }
    }

    function showPop(x, y, g, c, crit, dm) {
        const p = document.createElement('div');
        p.className = 'pop';
        p.style.left = x + 'px'; p.style.top = y + 'px';
        p.style.color = crit ? '#ff0' : '#fff';
        p.innerHTML = `+${Math.floor(g)}${crit ? ' CRIT!' : ''}${c > 0 ? `<br><span style="color:#00f2ff">+${c}</span>` : ''}${dm ? `<br><span class="dm">+1 DM</span>` : ''}`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }

    setInterval(() => {
        if(s.nodes.includes('a1')) {
            let inc = 10 * (s.nodes.includes('dm2') ? 50 : 1);
            s.g += inc;
            update();
        }
    }, 1000);

    renderTrees();
    update();
</script>
</body>
</html>
